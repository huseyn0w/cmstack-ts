services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-typress}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typress}
      POSTGRES_DB: ${POSTGRES_DB:-typress}
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-typress} -d ${POSTGRES_DB:-typress}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-typress}:${POSTGRES_PASSWORD:-typress}@db:5432/${POSTGRES_DB:-typress}?schema=public
      # Shared with the web app so it can sign tokens the API verifies.
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-shared-auth-secret-change-me}
      AUTH_TOKEN_TTL: ${AUTH_TOKEN_TTL:-7d}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-only-internal-secret-change-me}
      # Browser origin allowed to call the API (CORS) — the web app.
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      # Where uploaded media is written (persisted via the named volume below).
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "4000:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      # Browser-facing API URL.
      NEXT_PUBLIC_API_URL: http://localhost:4000
      # Server-side (container-to-container) API URL.
      API_INTERNAL_URL: http://api:4000
      # Public URL the web app is served from (Auth.js).
      AUTH_URL: http://localhost:3000
      # Must match the API's values exactly.
      AUTH_SECRET: ${AUTH_SECRET:-dev-only-shared-auth-secret-change-me}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:-dev-only-internal-secret-change-me}
      # Social login (optional) — leave blank to disable a provider.
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
    ports:
      - "3000:3000"

volumes:
  db-data:
  uploads:
