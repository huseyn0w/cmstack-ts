# ---------------------------------------------------------------------------
# Production stack: db + api + web behind nginx. Unlike docker-compose.yml
# (dev), the app containers are NOT exposed on host ports — only nginx is
# published (80/443). Run it standalone:
#
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec api pnpm --filter @cmstack-ts/db seed   # first boot
#
# Required in .env (see .env.example + docs/deployment/vps.md):
#   AUTH_SECRET, INTERNAL_API_SECRET, POSTGRES_PASSWORD,
#   PUBLIC_WEB_URL  (e.g. https://example.com),
#   PUBLIC_API_URL  (e.g. https://api.example.com)  # baked into the web bundle
#
# PUBLIC_WEB_URL / PUBLIC_API_URL default to http://localhost / http://api.localhost
# so a zero-config LOCAL dry-run works. For any real (non-localhost) deploy they
# are MANDATORY — otherwise CORS is locked to localhost and the browser bundle
# targets api.localhost. See docs/deployment/vps.md.
# ---------------------------------------------------------------------------
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cmstack-ts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cmstack-ts}
      POSTGRES_DB: ${POSTGRES_DB:-cmstack-ts}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cmstack-ts} -d ${POSTGRES_DB:-cmstack-ts}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-cmstack-ts}:${POSTGRES_PASSWORD:-cmstack-ts}@db:5432/${POSTGRES_DB:-cmstack-ts}?schema=public
      # Shared cache backend (multi-worker correct).
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      AUTH_TOKEN_TTL: ${AUTH_TOKEN_TTL:-7d}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?set INTERNAL_API_SECRET in .env}
      # Browser origin allowed to call the API (CORS) — the public site URL.
      WEB_ORIGIN: ${PUBLIC_WEB_URL:-http://localhost}
      UPLOAD_DIR: /app/uploads
      MEDIA_MAX_SIZE_MB: ${MEDIA_MAX_SIZE_MB:-10}
      # Spam protection (optional): set both to enable reCAPTCHA v3.
      RECAPTCHA_SECRET_KEY: ${RECAPTCHA_SECRET_KEY:-}
      RECAPTCHA_MIN_SCORE: ${RECAPTCHA_MIN_SCORE:-0.5}
    volumes:
      - uploads:/app/uploads
    expose:
      - "4000"
    healthcheck:
      # Use 127.0.0.1 (not localhost): the API listens on IPv4 0.0.0.0, while
      # `localhost` can resolve to IPv6 ::1 inside Alpine and be refused.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health/ready >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # NEXT_PUBLIC_* are inlined at BUILD time — rebuild the web image when
        # these change.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://api.localhost}
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_WEB_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Server-side (container-to-container) API URL.
      API_INTERNAL_URL: http://api:4000
      # Browser-facing API URL (also baked in at build; set here for parity).
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://api.localhost}
      # Public URL the web app is served from (Auth.js) + canonical SEO base.
      AUTH_URL: ${PUBLIC_WEB_URL:-http://localhost}
      NEXT_PUBLIC_SITE_URL: ${PUBLIC_WEB_URL:-http://localhost}
      # Must match the API exactly.
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?set INTERNAL_API_SECRET in .env}
      # Social login (optional) — leave blank to disable a provider.
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      AUTH_GITHUB_ID: ${AUTH_GITHUB_ID:-}
      AUTH_GITHUB_SECRET: ${AUTH_GITHUB_SECRET:-}
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-}
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "80:80"
      # - "443:443"   # enable with TLS (see nginx/cmstack-ts.conf + the VPS guide)
    volumes:
      - ./nginx/cmstack-ts.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/letsencrypt:/etc/letsencrypt:ro   # mount certs for TLS

volumes:
  db-data:
  uploads:
